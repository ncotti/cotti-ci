## Calls all example workflows present in this repository with
## "test/example_repo" as the target directory.

name: "Examples"
on: push

jobs:
  example_markdown_linter:
    runs-on: ubuntu-latest
    env:
      REPO: project_repo
    steps:
      - name: "Checkout project repo"
        uses: actions/checkout@v5
        with:
          path: ${{ env.REPO_PATH }}

      - name: "Call Markdown linter"
        uses: ncotti/cotti-ci/actions/markdown_linter.yml@v1
        with:
          target_dir: ${{ env.REPO_PATH }}

  example_license_check:
    runs-on: ubuntu-latest
    env:
      REPO: project_repo
      LICENSE: "GPL-3.0-or-later"
      COPYRIGHT: "Copyright (C) 2026  Nicolas Gabriel Cotti"
      EXTENSIONS: .c .h .yml .sh .bats
    steps:
      - name: "Checkout project repo"
        uses: actions/checkout@v5
        with:
          path: ${{ env.REPO_PATH }}

      - name: "Call license checker"
        uses: ncotti/cotti-ci/actions/licence_checker.yml@v1
        with:
          target_dir: ${{ env.REPO }}
          license: ${{ env.LICENSE }}
          COPYRIGHT: ${{ env.COPYRIGHT }}
          EXTENSION: ${{ env.EXTENSIONS }}
