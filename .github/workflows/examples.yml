name: "Examples"
description: <
  Calls all example workflows present in this repository.
on: push

jobs:
  example_markdown_linter:
    runs-on: ubuntu-latest
    env:
      # Modify to match your repo requirements
      REPO_PATH: .
    steps:
      - name: "Checkout project repo"
        uses: actions/checkout@v5
        with:
          path: ${{ env.REPO_PATH }}

      - name: "Call Markdown linter"
        # For usage in another repo:
        # ncotti/cotti-ci/actions/markdown_linter@vX
        uses: ./actions/markdown_linter
        with:
          target_dir: ${{ env.REPO_PATH }}

  example_license_check:
    runs-on: ubuntu-latest
    env:
      # Modify to match your repo requirements
      REPO_PATH: .
      LICENSE: "GPL-3.0-or-later"
      COPYRIGHT: "Copyright (C) 2026  Nicolas Gabriel Cotti"
      EXTENSIONS: ".c .h .yml .sh .bats"
    steps:
      - name: "Checkout project repo"
        uses: actions/checkout@v5
        with:
          path: ${{ env.REPO_PATH }}

      - name: "Call license checker"
        # For usage in another repo:
        # ncotti/cotti-ci/actions/license_checker@vX
        uses: ./actions/license_checker
        with:
          target_dir: "${{ env.REPO_PATH }}"
          license: "${{ env.LICENSE }}"
          copyright: "${{ env.COPYRIGHT }}"
          file_extensions: "${{ env.EXTENSIONS }}"

  example_bash_lint:
    runs-on: ubuntu-latest
    env:
      # Modify to match your repo requirements
      REPO_PATH: .

    steps:
      - name: "Checkout project repo"
        uses: actions/checkout@v5
        with:
          path: ${{ env.REPO_PATH }}

      - name: "Call bash linter"
        # For usage in another repo:
        # ncotti/cotti-ci/actions/bash_linter@vX
        uses: ./actions/bash_linter
        with:
          target_dir: "${{ env.REPO_PATH }}"

  example_bats_test:
    runs-on: ubuntu-latest
    env:
      # Modify to match your repo requirements
      REPO_PATH: .
      TEST_PATH: test
    steps:
      - name: "Checkout project repo"
        uses: actions/checkout@v5
        with:
          path: ${{ env.REPO_PATH }}

      - name: "Call BATS tester"
        # For usage in another repo:
        # ncotti/cotti-ci/actions/bats_tester@vX
        uses: ./actions/bats_tester
        with:
          target_dir: "${{ env.REPO_PATH }}/${{ env.TEST_PATH }}"

