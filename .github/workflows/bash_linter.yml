name: "Bash linter"
description: <
  Calls "shellcheck" on all bash script files
on: push

jobs:
  bash_linter:
    runs-on: ubuntu-latest
    env:
      # Modify to match your repo requirements
      REPO_PATH: .

    steps:
      - name: "Checkout project repo"
        uses: actions/checkout@v5
        with:
          path: ${{ env.REPO_PATH }}

      - name: "Call bash linter"
        # For usage in another repo:
        # ncotti/cotti-ci/actions/bash_linter@main
        uses: ./actions/bash_linter
        with:
          target_dir: "${{ env.REPO_PATH }}"
