name: "Markdown linter"
description: <
  Markdown linter with "markdownlint-cli2" and broken links checker with "lychee"
on: push

jobs:
  markdown_linter:
    runs-on: ubuntu-latest
    env:
      # Modify to match your repo requirements
      REPO_PATH: .
      CONFIG_FILE: ""
    steps:
      - name: "Checkout project repo"
        uses: actions/checkout@v5
        with:
          path: ${{ env.REPO_PATH }}

      - name: "Call Markdown linter"
        # For usage in another repo:
        # ncotti/cotti-ci/actions/markdown_linter@main
        uses: ./actions/markdown_linter
        with:
          target_dir: ${{ env.REPO_PATH }}
          config_file: ${{ env.CONFIG_FILE }}
