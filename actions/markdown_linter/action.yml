name: Markdown Linter
description: Enforces Markdown linter.

inputs:
  target_dir:
    description: "Root directory to parse files"
    required: true
    type: string
  config_file:
    description: ".markdownlint-cli2.jsonc file path inside your repo"
    default: ""
    required: false
    type: string

runs:
  using: "composite"
  steps:
    - name: "Markdown linter script"
      shell: bash
      run: |
        # If config_file is empty, use the default one from the repo
        # Expanding here to have access to github.action_path
        if [ -z "${{ inputs.config_file }}" ]; then
          CONFIG_FILE="${{ github.action_path }}/../../default_config/.markdownlint-cli2.jsonc
        else
          CONFIG_FILE="${{ inputs.config_file }}"
        fi

        chmod +x "${{ github.action_path }}/../../scripts/markdown_lint.sh"
        "${{ github.action_path }}/../../scripts/markdown_lint.sh" \
          "${{ inputs.target_dir }}" \
          "${CONFIG_FILE}"
